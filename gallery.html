<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - CHRISREAL EDUCATIONAL COMPLEX</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }
    .gallery-grid img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 18px;
      transition: 0.4s;
    }
    .gallery-grid img:hover {
      transform: scale(1.04);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
<nav class="navbar">

  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="image/chrisreallogo.jpg" alt="Chrisreal International School Logo">
      <span>CHRISREAL EDU. COMPLEX</span>
    </div>

    <!-- Desktop Menu -->
    <ul class="nav-links desktop-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="life.html">School Life</a></li>
      <li><a href="admission.html">Admissions</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="contact.html" >Contact</a></li>
    </ul>

    <!-- Hamburger -->
    <button class="hamburger" id="hamburger">
      ☰
    </button>

  </div>

  <!-- Overlay -->
  <div class="menu-overlay" id="menuOverlay"></div>

  <!-- Mobile Side Panel -->
  <div class="mobile-panel" id="mobilePanel">

    <button class="close-menu" id="closeMenu">
      ✕
    </button>

    <ul class="mobile-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="life.html">School Life</a></li>
      <li><a href="admission.html">Admissions</a></li>
      <li><a href="gallery.html"  class="active">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

  </div>

</nav>

  <header class="hero" style="height:55vh; background: linear-gradient(rgba(10,37,64,0.8), rgba(10,37,64,0.8)), url('../assets/images/group.jpg') center/cover;">
    <div class="hero-content">
      <h1>Campus Life Gallery</h1>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="gallery-grid">
        <img src="image/market.jpg" alt="Market Event">
        <img src="image/students.jpg" alt="Students">
        <img src="image/teachers.jpg" alt="Teachers Day">
        <img src="image/group.jpg" alt="Assembly">
        <!-- Add more images as you have them -->
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 CHRISREAL EDUCATIONAL COMPLEX • Kasoa, Ghana</p>
    </div>
  </footer>
  <script src="assets/js/main.js"></script>
