<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - CHRISREAL EDUCATIONAL COMPLEX</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      padding: 3rem 0;
    }
    .gallery-grid img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 12px;
      transition: 0.4s;
    }
    .gallery-grid img:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <!-- Same Navbar with active on Gallery -->
  <nav class="navbar"> ... (copy from previous) </nav>

  <header class="hero" style="height: 50vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('../assets/images/group.jpg') center/cover;">
    <div class="hero-content">
      <h1>Our Beautiful Campus & Moments</h1>
    </div>
  </header>

  <div class="container gallery-grid">
    <img src="assets/images/gallery-1.jpg" alt="School Event">
    <img src="assets/images/gallery-2.jpg" alt="Students">
    <img src="assets/images/teachers.jpg" alt="Teachers">
    <img src="assets/images/group.jpg" alt="Group Photo">
    <!-- Add more images as needed -->
  </div>

  <footer>
    <div class="container">
      <p>&copy; 2026 CHRISREAL EDUCATIONAL COMPLEX - Kasoa, Ghana. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
